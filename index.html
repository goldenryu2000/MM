<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melancholic Muser | Poetry</title>
  <meta name="description" content="A collection of melancholic poems and musings." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body class="theme-dark">
  <div id="ambient-bg" class="ambient-bg"></div>
  
  <header class="header">
    <div class="logo">
      <h1>Melancholic Muser</h1>
    </div>
    <nav class="nav-controls">
      <button id="random-btn" class="icon-btn" title="Random Poem">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
        <span class="btn-text">Discover</span>
      </button>
    </nav>
  </header>

  <main class="container">
    <section class="hero fade-in">
      <h2>Whispers in the dark.</h2>
      <p>A collection of thoughts, nostalgia, and melancholic musings.</p>
    </section>

    <nav class="filters fade-in" aria-label="Poem Categories">
      <button class="filter-btn active" data-category="all">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        All
      </button>
      <button class="filter-btn" data-category="nature">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
        Nature
      </button>
      <button class="filter-btn" data-category="melancholy">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10c0-4.4-3.6-8-8-8s-8 3.6-8 8v9c0 1.7 1.3 3 3 3h10c1.7 0 3-1.3 3-3v-9Z"/><path d="M12 21v-9"/><path d="M12 12A3 3 0 0 0 9 9"/></svg>
        Melancholy
      </button>
      <button class="filter-btn" data-category="magic">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M19 3v4"/><path d="M21 5h-4"/></svg>
        Magic
      </button>
      <button class="filter-btn" data-category="nostalgia">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>
        Nostalgia
      </button>
    </nav>

    <div id="poems-grid" class="poems-grid">
      <!-- Cards will be injected here by JS -->
    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Melancholic Muser. Crafted with Coffee and oregano.</p>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
